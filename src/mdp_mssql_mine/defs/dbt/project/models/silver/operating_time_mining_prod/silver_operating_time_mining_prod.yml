version: 2

models:
  - name: silver_operating_time_mining_prod
    description: |
      operating_time_mining_prodfrom mssql.

      This silver layer model provides a clean, business-friendly view of all component codes. 
      Sourced from the mssql tables.

    config:
      tags: ["silver", "operating_time_mining_prod"]

    columns:
      - name: monthyear
        description: "Month and year corresponding to the equipment operating record."

      - name: site
        description: "Mining site where the equipment operates."

      - name: equipment
        description: "Display name of the equipment."

      - name: model
        description: "Model of the equipment."

      - name: hours
        description: "Operating hours recorded for the equipment."

      - name: sn
        description: "Serial number of the equipment."
      
      - name: dbt_processed_at
        description: "Timestamp when dbt processed this data"
        tests:
          - not_null      

      - name: dbt_model_name
        description: "Name of the dbt model that created this record"  

      - name: layer_prefix
        description: "Data layer prefix (silver)"      
        
      - name: business_domain
        description: "Business domain classification"      