version: 2

models:
  - name: silver_downtime_data_mining_prod
    description: |
      downtime_data_mining_prodfrom mssql.

      This silver layer model provides a clean, business-friendly view of all component codes. 
      Sourced from the mssql tables.

    config:
      tags: ["silver", "equipment_list_mining_prod"]

    columns:
      - name: site
        description: "Site where the equipment activity or downtime was recorded."

      - name: equip
        description: "Display name of the equipment."   
           
      - name: model
        description: "Equipment model associated with the downtime record."    

      - name: worktype
        description: "Type of work performed during the maintenance activity."   

      - name: labourtype
        description: "Category of labour involved in the activity."      

      - name: descriptioncat
        description: "Description category of the maintenance or downtime event."    

      - name: starthours
        description: "Equipment hour meter reading at the start of the activity."   

      - name: endhours
        description: "Equipment hour meter reading at the end of the activity."  

      - name: downtimehours
        description: "Total downtime hours recorded for the event."      

      - name: comments
        description: "Free text comments describing the activity or issue."    

      - name: monthyear
        description: "Month and year associated with the record."      

      - name: equipment_id
        description: "Unique identifier of the equipment from the source system."     

      - name: sn
        description: "Equipment serial number."
        
      
      - name: dbt_processed_at
        description: "Timestamp when dbt processed this data"
        tests:
          - not_null      

      - name: dbt_model_name
        description: "Name of the dbt model that created this record"  

      - name: layer_prefix
        description: "Data layer prefix (silver)"      
        
      - name: business_domain
        description: "Business domain classification"      