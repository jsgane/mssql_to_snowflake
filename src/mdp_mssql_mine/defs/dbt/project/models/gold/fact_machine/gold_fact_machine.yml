version: 2

models:
  - name: fact_machine
    description: |
      fact_tum_kpis from mssql.

      This silver layer model provides a clean, business-friendly view of all fact_tum_kpis. 
      Sourced from mssql.

    config:
      tags: ["silver", "fact_tum_kpis"]
    
    columns:
      - name: sitedesc
        description: "Descriptive name of the site where the equipment is assigned."

      - name: siteid
        description: "Surrogate key identifying the site."
    
      - name: sitecode
        description: "Short business code representing the site."
    
      - name: neembeequipmentid
        description: "Surrogate key identifying the equipment in the Neemba system."
    
      - name: serialnumber
        description: "Equipment serial number."
    
      - name: lastdatasettime
        description: "Timestamp of the latest dataset received for the equipment."
    
      - name: reportingstatus
        description: "Indicates whether the equipment has reported data within the last 5 days (Reporting or Not Reporting)."
    
      - name: smu
        description: "Latest Service Meter Units (SMU) value recorded for the equipment."
    
      - name: source
        description: "Source system providing the SMU and dataset information."

      - name: dbt_model_name
        description: "Name of the dbt model that created this record"

      - name: layer_prefix
        description: "Data layer prefix (silver)"

      - name: business_domain
        description: "Business domain classification"