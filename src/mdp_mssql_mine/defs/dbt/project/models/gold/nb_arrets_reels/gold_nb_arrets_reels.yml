version: 2

models:
  - name: nb_arrets_reels
    description: |
      nb_arrets_reels from mssql.

      This silver layer model provides a clean, business-friendly view of all nb_arrets_reels. 
      Sourced from mssql.

    config:
      tags: ["silver", "nb_arrets_reels"]
    
    columns:
      - name: equipment_id
        description: "Unique identifier for each equipment."

      - name: equip
        description: "Equipment display name."

      - name: site
        description: "Name of the site where the equipment is located."

      - name: monthyear
        description: "Month and year of the record."

      - name: nombre_arrets_reels_total
        description: "Total number of actual stops for the equipment in the given month."

      - name: nombre_arrets_unplanned
        description: "Number of unplanned stops for the equipment in the given month."


      - name: dbt_model_name
        description: "Name of the dbt model that created this record"

      - name: layer_prefix
        description: "Data layer prefix (silver)"

      - name: business_domain
        description: "Business domain classification"