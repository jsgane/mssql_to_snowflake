name: 'mdp_mssql_mine'
version: '1.0.0'
config-version: 2

profile: 'mdp_mssql_mine'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  mdp_mssql_mine:
    silver:
      +materialized: view
      +tags: ["silver", "transformation"]
      
      mns_site:
        silver_mns_site:
          +alias: "Dim_Sites"
        +tags: ["silver", "mns_site"]
        +docs:
          node_color: "#4CAF50"
      
      ref_vw_nba_machines:
        silver_ref_vw_nba_machines:
          +alias: "Dim_Machine"
        +tags: ["silver", "ref_vw_nba_machines"]
        +docs:
          node_color: "#4CAF50"
      
      mns_utilisation_equipement:
        silver_mns_f_utilisation_equipement:
          +alias: "Fact_Op_Hours"
        +tags: ["silver", "mns_utilisation_equipement"]
        +docs:
          node_color: "#4CAF50"
      
      mts_vw_down_event_history:
        silver_mts_vw_down_event_history:
          +alias: "b_silver_mts_vw_down_event_history"
        +tags: ["silver", "mts_vw_down_event_history"]
        +docs:
          node_color: "#4CAF50"
      
      mts_vw_last_dataset_and_smu:
        silver_mts_vw_last_dataset_and_smu:
          +alias: "b_silver_mts_vw_last_dataset_and_smu"
        +tags: ["silver", "mts_vw_last_dataset_and_smu"]
        +docs:
          node_color: "#4CAF50"
      
      mts_vw_visionlink_alerts:
        silver_mts_vw_visionlink_alerts:
          +alias: "b_silver_mts_vw_visionlink_alerts"
        +tags: ["silver", "mts_vw_visionlink_alerts"]
        +docs:
          node_color: "#4CAF50"

    ### GOLD
    gold:
      +materialized: table
      +tags: ["gold", "analytics"]
      mts_vw_tum_kpis:
        gold_mts_vw_tum_kpis:
          +alias: "C_gold_mts_vw_tum_kpis"
        +tags: ["gold", "gold_mts_vw_tum_kpis"]
        +docs:
          node_color: "#FFD700"
          
      fact_tum_kpis:
        fact_tum_kpis:
          +alias: "fact_tum_kpis"
        +tags: ["gold", "fact_tum_kpis"]
        +docs:
          node_color: "#FFD700"
          
      fact_machine:
        fact_machine:
          +alias: "fact_machine"
        +tags: ["gold", "fact_machine"]
        +docs:
          node_color: "#FFD700"
      


tests:
  mdp_mssql_mine:
    +severity: warn
    +store_failures: true

vars:
  bronze_prefix: 'a_bronze_'
  silver_prefix: 'b_silver_'
  gold_prefix: 'c_gold_'
  schema_name: 'mines'
  lookback_days: 90
  environment: 'production'

dispatch:
  - macro_namespace: dbt
    search_order: ['mdp_mssql_mine', 'dbt']

on-run-start:
  - "{{ log('========================================', info=true) }}"
  - "{{ log('Starting dbt run for MDP Mines', info=true) }}"
  - "{{ log('Environment: ' ~ var('environment'), info=true) }}"
  - "{{ log('Schema: ' ~ var('schema_name'), info=true) }}"
  - "{{ log('========================================', info=true) }}"

on-run-end:
  - "{{ log('========================================', info=true) }}"
  - "{{ log('Completed dbt run for MDP Mines', info=true) }}"
  - "{{ log('========================================', info=true) }}"
