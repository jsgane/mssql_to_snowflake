name: 'mdp_mssql_mine'
version: '1.0.0'
config-version: 2

profile: 'mdp_mssql_mine'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  mdp_mssql_mine:
    silver:
      +materialized: view
      +tags: ["silver", "transformation"]
      
      mns_site:
        silver_mns_site:
          +alias: "Dim_Sites"
        +tags: ["silver", "mns_site"]
        +docs:
          node_color: "#4CAF50"
      
      ref_vw_nba_machines:
        silver_ref_vw_nba_machines:
          +alias: "Dim_Machine"
        +tags: ["silver", "ref_vw_nba_machines"]
        +docs:
          node_color: "#4CAF50"
      
      mns_utilisation_equipement:
        silver_mns_f_utilisation_equipement:
          +alias: "Fact_Op_Hours"
        +tags: ["silver", "mns_utilisation_equipement"]
        +docs:
          node_color: "#4CAF50"
      
      mts_vw_down_event_history:
        silver_mts_vw_down_event_history:
          +alias: "b_silver_mts_vw_down_event_history"
        +tags: ["silver", "mts_vw_down_event_history"]
        +docs:
          node_color: "#4CAF50"
      
      mts_vw_last_dataset_and_smu:
        silver_mts_vw_last_dataset_and_smu:
          +alias: "b_silver_mts_vw_last_dataset_and_smu"
        +tags: ["silver", "mts_vw_last_dataset_and_smu"]
        +docs:
          node_color: "#4CAF50"
      
      mts_vw_visionlink_alerts:
        silver_mts_vw_visionlink_alerts:
          +alias: "b_silver_mts_vw_visionlink_alerts"
        +tags: ["silver", "mts_vw_visionlink_alerts"]
        +docs:
          node_color: "#4CAF50"

      description_cat_list:
        silver_description_cat_list:
          +alias: "description_cat_list"
        +tags: ["silver", "description_cat_list"]
        +docs:
          node_color: "#4CAF50"

      downtime_by_models_mining_prod:
        silver_downtime_by_models_mining_prod:
          +alias: "downtime_by_models_mining_prod"
        +tags: ["silver", "downtime_by_models_mining_prod"]
        +docs:
          node_color: "#4CAF50"

      downtime_data_mining_prod:
        silver_downtime_data_mining_prod:
          +alias: "downtime_data_mining_prod"
        +tags: ["silver", "downtime_data_mining_prod"]
        +docs:
          node_color: "#4CAF50"

      equipment_list_mining_prod:
        silver_equipment_list_mining_prod:
          +alias: "equipment_list_mining_prod"
        +tags: ["silver", "equipment_list_mining_prod"]
        +docs:
          node_color: "#4CAF50"

      mine_site_list_mining_prod:
        silver_mine_site_list_mining_prod:
          +alias: "mine_site_list_mining_prod"
        +tags: ["silver", "mine_site_list_mining_prod"]
        +docs:
          node_color: "#4CAF50"

      model_list_mining_prod:
        silver_model_list_mining_prod:
          +alias: "model_list_mining_prod"
        +tags: ["silver", "model_list_mining_prod"]
        +docs:
          node_color: "#4CAF50"

      operating_time_mining_prod:
        silver_operating_time_mining_prod:
          +alias: "operating_time_mining_prod"
        +tags: ["silver", "operating_time_mining_prod"]
        +docs:
          node_color: "#4CAF50"

      product_group:
        silver_product_group:
          +alias: "product_group"
        +tags: ["silver", "product_group"]
        +docs:
          node_color: "#4CAF50"

      vw_mtbf_after_pm:
        silver_vw_mtbf_after_pm:
          +alias: "b_silver_vw_mtbf_after_pm"
        +tags: ["silver", "vw_mtbf_after_pm"]
        +docs:
          node_color: "#4CAF50"

      vw_nombre_arrets_reels:
        silver_vw_nombre_arrets_reels:
          +alias: "b_silver_vw_nombre_arrets_reels"
        +tags: ["silver", "vw_nombre_arrets_reels"]
        +docs:
          node_color: "#4CAF50"

      customer_type_performance_target:
        silver_customer_type_performance_target:
          +alias: "b_silver_customer_type_performance_target"
        +tags: ["silver", "customer_type_performance_target"]
        +docs:
          node_color: "#4CAF50"





    ### GOLD
    gold:
      +materialized: table
      +tags: ["gold", "analytics"]
      
      mts_vw_tum_kpis:
        gold_mts_vw_tum_kpis:
          +alias: "C_gold_mts_vw_tum_kpis"
        +tags: ["gold", "gold_mts_vw_tum_kpis"]
        +docs:
          node_color: "#FFD700"
          
      fact_tum_kpis:
        fact_tum_kpis:
          +alias: "fact_tum_kpis"
        +tags: ["gold", "fact_tum_kpis"]
        +docs:
          node_color: "#FFD700"
          
      fact_machine:
        fact_machine:
          +alias: "fact_machine"
        +tags: ["gold", "fact_machine"]
        +docs:
          node_color: "#FFD700"
          
      fact_vision_link_condition_monitoring:
        fact_vision_link_condition_monitoring:
          +alias: "fact_vision_link_condition_monitoring"
        +tags: ["gold", "fact_vision_link_condition_monitoring"]
        +docs:
          node_color: "#FFD700"
          
      fact_smu:
        fact_smu:
          +alias: "fact_smu"
        +tags: ["gold", "fact_smu"]
        +docs:
          node_color: "#FFD700"
          
      mtbf_after_pm:
        mtbf_after_pm:
          +alias: "mtbf_after_pm"
        +tags: ["gold", "mtbf_after_pm"]
        +docs:
          node_color: "#FFD700"
          
      nb_arrets_reels:
        nb_arrets_reels:
          +alias: "nb_arrets_reels"
        +tags: ["gold", "nb_arrets_reels"]
        +docs:
          node_color: "#FFD700"
      
      


tests:
  mssql_to_snowflake:
    +severity: warn
    +store_failures: true

vars:
  bronze_prefix: 'a_bronze_'
  silver_prefix: 'b_silver_'
  gold_prefix: 'c_gold_'
  schema_name: 'mines'
  lookback_days: 90
  environment: 'production'

dispatch:
  - macro_namespace: dbt
    search_order: ['mssql_to_snowflake', 'dbt']

on-run-start:
  - "{{ log('========================================', info=true) }}"
  - "{{ log('Starting dbt run for MDP Mines', info=true) }}"
  - "{{ log('Environment: ' ~ var('environment'), info=true) }}"
  - "{{ log('Schema: ' ~ var('schema_name'), info=true) }}"
  - "{{ log('========================================', info=true) }}"

on-run-end:
  - "{{ log('========================================', info=true) }}"
  - "{{ log('Completed dbt run for MDP Mines', info=true) }}"
  - "{{ log('========================================', info=true) }}"
