name: Build, Push and deploy new dagster project

on:
  push:
    # branches:
    #   - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (defaults to git SHA)"
        required: false
        type: string

env:
  REGISTRY: ${{ vars.NEEMBA_LOCAL_DATA_REGISTRY || 'dagster-registry:6000' }}
  IMAGE_NAME: ${{ github.event.repository.name }}

## JOBS


jobs:

  # DETERMINE TAG ────────────────────────────────────────────────────────
  determine-tag:
    runs-on: self-hosted
    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

  # ─INSTALL BCP + VALIDATE MSSQL ─────────────────────────────────────────
  install-bcp:
    runs-on: self-hosted
    needs: determine-tag

    steps:
      - name: Install Microsoft ODBC Driver 18 + BCP (mssql-tools18)
        run: |
          if ! command -v bcp &> /dev/null; then
            echo "BCP not found — installing mssql-tools18..."

            curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
              | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg

            curl -sSL https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list \
              | sudo tee /etc/apt/sources.list.d/mssql-release.list

            sudo apt-get update -qq

            sudo ACCEPT_EULA=Y apt-get install -y -qq \
              mssql-tools18 \
              msodbcsql18 \
              unixodbc-dev

            echo 'export PATH="$PATH:/opt/mssql-tools18/bin"' \
              | sudo tee -a /etc/environment
          else
            echo "BCP already installed: $(bcp -v 2>&1 | head -1)"
          fi

          export PATH="$PATH:/opt/mssql-tools18/bin"
          bcp -v 2>&1 | head -1 && echo "✅ BCP ready"

      - name: Validate MSSQL connectivity
        env:
          MSSQL_HOST:     ${{ secrets.MSSQL_HOST }}
          MSSQL_PORT:     ${{ secrets.MSSQL_PORT }}
          MSSQL_USER:     ${{ secrets.MSSQL_USER }}
          MSSQL_PASSWORD: ${{ secrets.MSSQL_PASSWORD }}
          MSSQL_DATABASE: ${{ secrets.MSSQL_DATABASE }}
        run: |
          export PATH="$PATH:/opt/mssql-tools18/bin"
          echo "Testing MSSQL connection to ${MSSQL_HOST}:${MSSQL_PORT}..."

          sqlcmd \
            -S "${MSSQL_HOST},${MSSQL_PORT}" \
            -U "${MSSQL_USER}" \
            -P "${MSSQL_PASSWORD}" \
            -d "${MSSQL_DATABASE}" \
            -Q "SELECT @@VERSION" \
            -C \
            -l 10 \
            && echo "✅ MSSQL connection OK" \
            || { echo "❌ MSSQL connection failed"; exit 1; }

  # BUILD & PUSH DOCKER IMAGE ────────────────────────────────────────────
  build-and-push:
    runs-on: self-hosted
    needs: [determine-tag, install-bcp]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg GITHUB_TOKEN=${{ secrets.GH_PAT }} \
            --build-arg MSSQL_HOST=${{ secrets.MSSQL_HOST }} \
            --build-arg MSSQL_PORT=${{ secrets.MSSQL_PORT }} \
            --build-arg MSSQL_USER=${{ secrets.MSSQL_USER }} \
            --build-arg MSSQL_DATABASE=${{ secrets.MSSQL_DATABASE }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.determine-tag.outputs.image_tag }} .

          docker tag \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.determine-tag.outputs.image_tag }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.determine-tag.outputs.image_tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ─DEPLOY VIA SSH + DOCKER ──────────────────────────────────────────────
  deploy:
    runs-on: self-hosted
    needs: [determine-tag, build-and-push]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write .env file for remote server
        run: |
          cat > deploy.env <<EOF
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.determine-tag.outputs.image_tag }}
          IMAGE_NAME=${{ env.IMAGE_NAME }}

          # MSSQL / BCP
          MSSQL_HOST=${{ secrets.MSSQL_HOST }}
          MSSQL_PORT=${{ secrets.MSSQL_PORT }}
          MSSQL_USER=${{ secrets.MSSQL_USER }}
          MSSQL_PASSWORD=${{ secrets.MSSQL_PASSWORD }}
          MSSQL_DATABASE=${{ secrets.MSSQL_DATABASE }}

          # Snowflake
          SNOWFLAKE_ACCOUNT=${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER=${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD=${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE=${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE=${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE=${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA=${{ secrets.SNOWFLAKE_SCHEMA }}
          EOF

      - name: Copy .env to remote server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          source:   deploy.env
          target:   /opt/dagster/${{ env.IMAGE_NAME }}/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            DEPLOY_DIR="/opt/dagster/${{ env.IMAGE_NAME }}"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.determine-tag.outputs.image_tag }}"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  1/5 — Install BCP on server (if missing)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            if ! command -v bcp &> /dev/null; then
              curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
                | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg

              curl -sSL https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list \
                | sudo tee /etc/apt/sources.list.d/mssql-release.list

              sudo apt-get update -qq
              sudo ACCEPT_EULA=Y apt-get install -y -qq \
                mssql-tools18 msodbcsql18 unixodbc-dev

              echo 'export PATH="$PATH:/opt/mssql-tools18/bin"' \
                | sudo tee -a /etc/environment
            fi
            export PATH="$PATH:/opt/mssql-tools18/bin"
            echo "✅ BCP ready: $(bcp -v 2>&1 | head -1)"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  2/5 — Prepare deploy directory"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            mkdir -p "$DEPLOY_DIR"
            cp "$DEPLOY_DIR/deploy.env" "$DEPLOY_DIR/.env"
            echo "✅ .env ready"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  3/5 — Pull new Docker image"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            docker pull "$IMAGE"
            echo "✅ Image pulled: $IMAGE"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  4/5 — Restart container"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            docker stop "${{ env.IMAGE_NAME }}" 2>/dev/null || true
            docker rm   "${{ env.IMAGE_NAME }}" 2>/dev/null || true

            docker run -d \
              --name "${{ env.IMAGE_NAME }}" \
              --restart unless-stopped \
              --env-file "$DEPLOY_DIR/.env" \
              -e PATH="/opt/mssql-tools18/bin:$PATH" \
              -v /opt/mssql-tools18:/opt/mssql-tools18:ro \
              -v /etc/odbcinst.ini:/etc/odbcinst.ini:ro \
              -p 3000:3000 \
              "$IMAGE"

            echo "✅ Container started"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  5/5 — Health check"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            sleep 10
            docker ps \
              --filter "name=${{ env.IMAGE_NAME }}" \
              --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            if ! docker ps \
              --filter "name=${{ env.IMAGE_NAME }}" \
              --filter "status=running" | grep -q "${{ env.IMAGE_NAME }}"; then
              echo "❌ Container failed to start. Logs:"
              docker logs "${{ env.IMAGE_NAME }}" --tail 50
              exit 1
            fi

            echo ""
            echo "🚀 Deploy complete: $IMAGE"

  #5. UPDATE REGISTRY (replaces MinIO) ─────────────────────────────────────
  # Commits dagster-pipelines.json directly into the repo.
  # No external storage needed — file is versioned and visible to everyone.
  update-registry:
    runs-on: self-hosted
    needs: deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use GitHub App token so the commit can trigger other workflows
          token: ${{ secrets.GH_PAT }}

      - name: Install jq
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

      - name: Update dagster-pipelines.json
        run: |
          REGISTRY_FILE="dagster-pipelines.json"

          # Create file if it doesn't exist yet
          [ -f "$REGISTRY_FILE" ] || echo "[]" > "$REGISTRY_FILE"

          PROJECT_NAME="${{ github.event.repository.name }}"
          PROJECT_URL="${{ github.event.repository.html_url }}"
          IMAGE_TAG="${{ needs.determine-tag.outputs.image_tag }}"
          DEPLOYED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          # Upsert entry — replace existing project or append new one
          jq \
            --arg name       "$PROJECT_NAME" \
            --arg repo       "$PROJECT_URL" \
            --arg tag        "$IMAGE_TAG" \
            --arg deployed   "$DEPLOYED_AT" \
            'map(select(.name != $name)) + [{
               "name":        $name,
               "repository":  $repo,
               "image_tag":   $tag,
               "deployed_at": $deployed
             }]' \
            "$REGISTRY_FILE" > tmp.json && mv tmp.json "$REGISTRY_FILE"

          echo "=== Updated dagster-pipelines.json ==="
          jq . "$REGISTRY_FILE"

      - name: Commit and push registry update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dagster-pipelines.json

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to dagster-pipelines.json — skipping commit"
          else
            git commit -m "chore: update registry → ${{ env.IMAGE_NAME }} @ ${{ needs.determine-tag.outputs.image_tag }}"
            git push origin HEAD:main
            echo "✅ dagster-pipelines.json committed and pushed"
          fi

  # ─SYNC DBT TO SNOWFLAKE ─────────────────────────────────────────────────
  sync-dbt-to-snowflake:
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Snowflake CLI
        run: |
          wget https://sfc-repo.snowflakecomputing.com/snowflake-cli/linux_x86_64/3.12.0/snowflake-cli-3.12.0.x86_64.deb
          sudo dpkg -i snowflake-cli-3.12.0.x86_64.deb

      - name: Setup private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" | base64 -d > snowflake_rsa_key.p8
          chmod 600 snowflake_rsa_key.p8

      - name: Configure Snowflake connection
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml <<EOF
          [connections.deploy]
          account = "${{ secrets.SNOWFLAKE_ACCOUNT }}"
          user = "${{ secrets.SNOWFLAKE_USER }}"
          authenticator = "SNOWFLAKE_JWT"
          private_key_file = "snowflake_rsa_key.p8"
          EOF
          chmod 0600 ~/.snowflake/config.toml

      - name: Set derived variables
        id: vars
        run: |
          REPO_NAME="${{ github.event.repository.name }}"

          if [[ ! "$REPO_NAME" =~ ^mdp- ]]; then
            echo "WARNING: Repository name does not start with 'mdp-' prefix"
            echo "Current: $REPO_NAME"
          fi

          PYTHON_MODULE=$(echo "$REPO_NAME" | tr '-' '_')
          echo "PYTHON_MODULE=${PYTHON_MODULE}" >> $GITHUB_OUTPUT
          echo "✓ Python module: ${PYTHON_MODULE}"

          SCHEMA="services"
          echo "SCHEMA=${SCHEMA}" >> "$GITHUB_OUTPUT"
          echo "✓ Schema: ${SCHEMA}"

          echo ""
          echo "=== Derived Configuration ==="
          echo "Repository:    $REPO_NAME"
          echo "Python Module: $PYTHON_MODULE"
          echo "Schema:        $SCHEMA"

      - name: Prepare dbt project for production
        run: |
          rm -rf src/${{ steps.vars.outputs.PYTHON_MODULE }}/defs/dbt/project/target
          rm -rf src/${{ steps.vars.outputs.PYTHON_MODULE }}/defs/dbt/project/logs
          rm -rf src/${{ steps.vars.outputs.PYTHON_MODULE }}/defs/dbt/project/dbt_packages

          cp src/${{ steps.vars.outputs.PYTHON_MODULE }}/defs/dbt/project/profiles.prod.yml \
             src/${{ steps.vars.outputs.PYTHON_MODULE }}/defs/dbt/project/profiles.yml

          echo "✅ dbt project prepared"

      - name: Deploy dbt project to Snowflake
        run: |
          snow dbt deploy ${{ steps.vars.outputs.PYTHON_MODULE }} \
            --source src/${{ steps.vars.outputs.PYTHON_MODULE }}/defs/dbt/project \
            --database NEEMBA \
            --schema ${{ steps.vars.outputs.SCHEMA }} \
            --warehouse COMPUTE_WH \
            --role TRANSFORM \
            -c deploy

          echo "✅ dbt project '${{ steps.vars.outputs.PYTHON_MODULE }}' synced to Snowflake"

      - name: Validate dbt project
        run: |
          snow sql -q "SHOW DBT PROJECTS IN SCHEMA ${{ steps.vars.outputs.SCHEMA }}" -c deploy
          echo "✅ dbt validation complete"
